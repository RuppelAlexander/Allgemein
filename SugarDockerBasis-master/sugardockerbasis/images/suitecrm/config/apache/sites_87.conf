<VirtualHost *:80>
    ServerName localhost
    DocumentRoot "/var/www/html/sugar/public/"

    <Directory "/var/www/html/sugar/public/">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    <IfModule setenvif_module>
        SetEnvIfNoCase ^Authorization$ "(.+)" HTTP_AUTHORIZATION=$1
    </IfModule>

</VirtualHost>
