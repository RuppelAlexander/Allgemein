services:
    sugar:
        container_name: ${BASE_NAME}-web1
        image: sugarcrmdevelopers/sugardockerized:php8.3.14-apache-latest
        ports:
            - ${SUGAR_PORT}:80
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            - "APACHE_RUN_USER=sugar"
            - "APACHE_RUN_GROUP=sugar"
        volumes:
            - type: bind
              source: ../../data/app
              target: /var/www/html
            - ../../images/php/83/apache/config/php/docker.ini:/usr/local/etc/php/conf.d/docker.ini
            - ../../images/php/83/apache/config/php/docker-php-ext-redis.ini:/usr/local/etc/php/conf.d/docker-php-ext-redis.ini
            - ../../images/php/83/apache/config/php/tideways.ini:/usr/local/etc/php/conf.d/tideways.ini
            - ../../images/php/83/apache/config/php/xhprof.ini:/usr/local/etc/php/conf.d/xhprof.ini
        depends_on:
            elasticsearch:
                condition: service_healthy
            mysql:
                condition: service_healthy
            permissions:
                condition: service_completed_successfully
        links:
            - mysql
            - elasticsearch
    cron:
        container_name: ${BASE_NAME}-cron
        image: sugarcrmdevelopers/sugardockerized:php8.3.14-cron-latest
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - type: bind
              source: ../../data/app
              target: /var/www/html
            - ../../images/php/83/cron/config/php/docker.ini:/usr/local/etc/php/conf.d/docker.ini
        depends_on:
            elasticsearch:
                condition: service_healthy
            mysql:
                condition: service_healthy
            permissions:
                condition: service_completed_successfully
        links:
            - mysql
            - elasticsearch
